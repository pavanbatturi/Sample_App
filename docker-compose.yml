services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chitfund
      POSTGRES_PASSWORD: chitfund
      POSTGRES_DB: chitfund
    volumes:
      - chitfund_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chitfund -d chitfund"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chitfund_pgdata:
